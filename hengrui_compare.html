function calcMA(arr, n) {
    var r = [];
    for (var i = 0; i < arr.length; i++) {
        if (i < n-1) { r.push('-'); continue; }
        var s = 0;
        for (var j = i-n+1; j <= i; j++) s += arr[j];
        r.push(+(s/n).toFixed(2));
    }
    return r;
}

function klineChart(id, data, upC, dnC) {
    var dates = data.map(function(d){return d.trade_date});
    var cls = data.map(function(d){return d.close});
    var kd = data.map(function(d){return [d.open,d.close,d.low,d.high]});
    var ma5=calcMA(cls,5), ma10=calcMA(cls,10), ma20=calcMA(cls,20);
    var vols = data.map(function(d){return d.volume});
    var vc = vols.map(function(_,i){
        if(i==0) return upC+'55';
        return data[i].close>=data[i-1].close ? upC+'55' : dnC+'55';
    });
    var chart = echarts.init(document.getElementById(id));
    chart.setOption({
        backgroundColor:'#16162a',
        tooltip:{
            trigger:'axis',axisPointer:{type:'cross'},
            backgroundColor:'rgba(20,20,40,0.9)',borderColor:'#555',
            textStyle:{color:'#eee',fontSize:12},
            formatter:function(p){
                var idx=p[0].dataIndex, d=data[idx];
                var pc=idx>0?data[idx-1].close:d.open;
                var pct=((d.close-pc)/pc*100).toFixed(2);
                var col=d.close>=pc?upC:dnC;
                return '<b>'+d.trade_date+'</b><br/>'+
                    '开盘: <span style="float:right">'+d.open.toFixed(2)+'</span><br/>'+
                    '收盘: <span style="float:right;color:'+col+'">'+d.close.toFixed(2)+'</span><br/>'+
                    '最高: <span style="float:right">'+d.high.toFixed(2)+'</span><br/>'+
                    '最低: <span style="float:right">'+d.low.toFixed(2)+'</span><br/>'+
                    '成交量: <span style="float:right">'+(d.volume/10000).toFixed(0)+'万</span>';
            }
        },
        legend:{data:['K线','MA5','MA10','MA20'],top:4,textStyle:{color:'#ccc',fontSize:11}},
        grid:[{left:50,right:16,top:32,height:180},{left:50,right:16,top:230,height:80}],
        xAxis:[
            {type:'category',data:dates,gridIndex:0,axisLabel:{color:'#777',fontSize:10,interval:Math.floor(dates.length/6)},axisLine:{show:false},boundaryGap:true},
            {type:'category',data:dates,gridIndex:1,axisLabel:{show:false},axisLine:{show:false},boundaryGap:true}
        ],
        yAxis:[
            {scale:true,gridIndex:0,axisLabel:{color:'#888',fontSize:10},splitLine:{lineStyle:{color:'#222',type:'dashed'}}},
            {scale:true,gridIndex:1,axisLabel:{color:'#888',fontSize:10,formatter:function(v){return (v/10000).toFixed(0)+'万'}},splitLine:{show:false}}
        ],
        dataZoom:[
            {type:'inside',xAxisIndex:[0,1],start:0,end:100},
            {type:'slider',xAxisIndex:[0,1],bottom:2,start:0,end:100,height:14,borderColor:'#333',fillerColor:'rgba(100,100,200,0.15)',textStyle:{color:'#666',fontSize:9}}
        ],
        series:[
            {name:'K线',type:'candlestick',data:kd,xAxisIndex:0,yAxisIndex:0,itemStyle:{color:upC,color0:dnC,borderColor:upC,borderColor0:dnC}},
            {name:'MA5',type:'line',data:ma5,xAxisIndex:0,yAxisIndex:0,smooth:true,showSymbol:false,lineStyle:{width:1},itemStyle:{color:'#f5c878'}},
            {name:'MA10',type:'line',data:ma10,xAxisIndex:0,yAxisIndex:0,smooth:true,showSymbol:false,lineStyle:{width:1},itemStyle:{color:'#8a9fe2'}},
            {name:'MA20',type:'line',data:ma20,xAxisIndex:0,yAxisIndex:0,smooth:true,showSymbol:false,lineStyle:{width:1},itemStyle:{color:'#ed6d66'}},
            {name:'成交量',type:'bar',data:vols.map(function(v,i){return{value:v,itemStyle:{color:vc[i]}}}),xAxisIndex:1,yAxisIndex:1,barWidth:'60%'}
        ]
    });
    window.addEventListener('resize',function(){chart.resize()});
}

// Stats
(function(){
    function calc(data){
        var cls=data.map(function(d){return d.close});
        var hi=-Infinity, lo=Infinity;
        data.forEach(function(d){if(d.high>hi)hi=d.high;if(d.low<lo)lo=d.low});
        var sum=cls.reduce(function(a,b){return a+b},0);
        return{
            start:data[0].close.toFixed(2),
            end:data[data.length-1].close.toFixed(2),
            high:hi.toFixed(2), low:lo.toFixed(2),
            avg:(sum/cls.length).toFixed(2),
            chg:((data[data.length-1].close-data[0].close)/data[0].close*100).toFixed(2),
            count:data.length
        };
    }
    var as=calc(A_DATA), hs=calc(H_DATA);
    var sgn=function(v){return parseFloat(v)>0?'+':''};
    document.getElementById('stats-grid').innerHTML=
        '<div class="stat-card">'+
            '<h3>恒瑞医药 A股 <span class="tag tag-a">600276.SH</span></h3>'+
            '<div class="stat-row"><span class="stat-label">起始收盘</span><span class="stat-value">'+as.start+'</span></div>'+
            '<div class="stat-row"><span class="stat-label">最新收盘</span><span class="stat-value">'+as.end+'</span></div>'+
            '<div class="stat-row"><span class="stat-label">区间涨跌幅</span><span class="stat-value'+(parseFloat(as.chg)>=0?' up':' down')+'">'+sgn(as.chg)+as.chg+'%</span></div>'+
            '<div class="stat-row"><span class="stat-label">最高价</span><span class="stat-value">'+as.high+'</span></div>'+
            '<div class="stat-row"><span class="stat-label">最低价</span><span class="stat-value">'+as.low+'</span></div>'+
            '<div class="stat-row"><span class="stat-label">均价</span><span class="stat-value">'+as.avg+'</span></div>'+
            '<div class="stat-row"><span class="stat-label">交易天数</span><span class="stat-value">'+as.count+'</span></div>'+
        '</div>'+
        '<div class="stat-card">'+
            '<h3>恒瑞医药 港股 <span class="tag tag-h">01276.HK</span></h3>'+
