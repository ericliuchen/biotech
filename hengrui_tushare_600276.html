function calcMA(arr, period) {
    var r = [];
    for (var i = 0; i < arr.length; i++) {
        if (i < period - 1) { r.push('-'); continue; }
        var s = 0;
        for (var j = i - period + 1; j <= i; j++) s += arr[j];
        r.push(+(s / period).toFixed(2));
    }
    return r;
}

var dates   = DATA.map(function(d) { return d.trade_date; });
var closes  = DATA.map(function(d) { return d.close; });
var kData   = DATA.map(function(d) { return [d.open, d.close, d.low, d.high]; });
var volumes = DATA.map(function(d) { return d.vol; });

var ma5  = calcMA(closes, 5);
var ma10 = calcMA(closes, 10);
var ma20 = calcMA(closes, 20);

var volColors = volumes.map(function(_, i) {
    if (i === 0) return 'rgba(239,35,42,0.35)';
    return DATA[i].close >= DATA[i-1].close
        ? 'rgba(239,35,42,0.35)' : 'rgba(20,177,67,0.35)';
});

// Info bar
var last = DATA[DATA.length - 1];
var chgCls = last.change >= 0 ? 'up' : 'down';
var sign = last.change >= 0 ? '+' : '';

    '<span>收盘价：<span class="val ' + chgCls + '">' + last.close.toFixed(2) + '</span></span>' +
    '<span>涨跌额：<span class="val ' + chgCls + '">' + sign + last.change.toFixed(2) + '</span></span>' +
    '<span>涨跌幅：<span class="val ' + chgCls + '">' + sign + last.pct_chg.toFixed(2) + '%</span></span>' +
    '<span>成交量：<span class="val">' + (last.vol / 10000).toFixed(2) + ' 万手</span></span>' +
    '<span>成交额：<span class="val">' + (last.amount / 100000).toFixed(2) + ' 亿</span></span>';

    animation: true,
    legend: {
        data: ['K线','MA5','MA10','MA20','成交量'],
        top: 8, textStyle: { color: '#ccc', fontSize: 12 }
    },

        trigger: 'axis', axisPointer: { type: 'cross' },
        backgroundColor: 'rgba(20,20,40,0.9)', borderColor: '#555',
        textStyle: { color: '#eee', fontSize: 13 },
        formatter: function(params) {

            var pc = idx > 0 ? DATA[idx-1].close : d.open;
            var pct = ((d.close - pc) / pc * 100).toFixed(2);
            var col = d.close >= pc ? '#ef232a' : '#14b143';

                '最高：<span style="float:right">' + d.high.toFixed(2) + '</span><br/>' +

        }
    },

    grid: [
